name: Build and Deploy Documentation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Purge snap
        run: |
            sudo apt purge snapd
            sudo apt-mark hold snapd

      - name: Setup Chromium Repo
        run: |
          sudo wget 'https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x869689FE09306074' -O '/etc/apt/trusted.gpg.d/phd-chromium.asc'
          echo "deb https://freeshell.de/phd/chromium/$(lsb_release -sc) /" | sudo tee /etc/apt/sources.list.d/phd-chromium.list

      - name: Update apt
        run: sudo apt update

      - name: Install Dependencies
        run: sudo apt install texlive latex-cjk-all texlive-pictures texlive-latex-extra texlive-extra-utils latexmk pdf2svg texlive-xetex texlive-luatex fonts-noto-cjk fonts-noto-core fonts-noto-extra chromium

      - name: Install Mermaid-cli
        run: sudo npm install -g @mermaid-js/mermaid-cli

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
      - name: Prepare Sphinx
        run: |
            uv venv
            uv sync

      - name: Build HTML Pages
        run: |
            source .venv/bin/activate
            make html

      - name: Build PDF Documents
        run: |
            source .venv/bin/activate
            make latexpdf
            mv build/latex/deeplearningclubhandouts.pdf ./build/html # Move PDF to HTML folder for uploading

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@4.1.0
        with:
          branch: gh-pages
          folder: build/html
